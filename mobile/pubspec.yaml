name: contex_mobile
description: ConteX mobile — AI photo generation (Ghibli, anime, cinematic, and more).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  path: ^1.9.1
  path_provider: ^2.1.5
  gal: ^2.3.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.example
    - lib/assets/contex.png
